$schema: "https://raw.githubusercontent.com/omnigres/omnigres/master/pg_yregress/schema.json"
instance:
  init:
  - create extension omni_git cascade

tests:

- name: type_name returns correct names
  steps:
  - query: select omni_git.type_name(1::smallint)
    results:
    - type_name: commit
  - query: select omni_git.type_name(2::smallint)
    results:
    - type_name: tree
  - query: select omni_git.type_name(3::smallint)
    results:
    - type_name: blob
  - query: select omni_git.type_name(4::smallint)
    results:
    - type_name: tag

- name: object_hash matches git hash-object for blob
  query: |
    select encode(omni_git.object_hash(3::smallint, convert_to('hello world', 'UTF8')), 'hex') as hash
  results:
  - hash: 95d09f2b10159347eece71399a7e2e907ea3df4f

- name: write and read blob
  steps:
  - query: insert into omni_git.repositories (name) values ('test') returning id
    results:
    - id: 1
  - query: |
      select encode(omni_git.object_write(1, 3::smallint, convert_to('hello', 'UTF8')), 'hex') as oid
    results:
    - oid: ce013625030ba8dba906f756967f9e9ca394464a
  - query: |
      select type, size, convert_from(content, 'UTF8') as content
      from omni_git.object_read(1, decode('ce013625030ba8dba906f756967f9e9ca394464a', 'hex'))
    results:
    - type: 3
      size: 5
      content: hello

- name: write is idempotent
  steps:
  - query: insert into omni_git.repositories (name) values ('idemp') returning id
    results:
    - id: 2
  - query: select omni_git.object_write(2, 3::smallint, convert_to('dup', 'UTF8'))
  - query: select omni_git.object_write(2, 3::smallint, convert_to('dup', 'UTF8'))
  - query: select count(*) from omni_git.objects where repo_id = 2
    results:
    - count: 1
